<style>
  :root{
    /* Hungarian flag palette: red #CD2A3E · white #FFFFFF · green #436F4D */
    --bg:#f4f7f4; --card:#fff; --ink:#222; --muted:#6b7783;
    --accent:#CD2A3E; --accent2:#436F4D; --line:#dfe6df; --warn:#b07a00;
    --transit:#1565c0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45}
  header{position:sticky;top:0;z-index:600;background:var(--accent2);color:#fff;
    padding:.7rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
    box-shadow:0 2px 8px rgba(0,0,0,.15)}
  header h1{font-size:1.15rem;margin:0;font-weight:600;flex:1 1 auto}
  .controls{display:flex;gap:.4rem;flex-wrap:wrap}
  .btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.5);
    padding:.35rem .7rem;border-radius:999px;font-size:.85rem;cursor:pointer}
  .btn:hover{background:rgba(255,255,255,.3)}
  .seg{display:inline-flex;border:1px solid rgba(255,255,255,.5);border-radius:999px;overflow:hidden}
  .seg button{background:transparent;color:#fff;border:0;padding:.35rem .7rem;font-size:.85rem;cursor:pointer}
  .seg button.active{background:#fff;color:var(--accent);font-weight:600}
  nav.days{display:flex;gap:.4rem;overflow-x:auto;padding:.6rem 1rem;background:#eaf1ea;
    border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:550}
  nav.days button{flex:0 0 auto;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:.35rem .6rem;font-size:.8rem;cursor:pointer;text-align:center;line-height:1.2}
  nav.days button .num{display:block;font-weight:700;color:var(--accent)}
  nav.days button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  nav.days button.active .num{color:#fff}
  .wrap{max-width:1200px;margin:0 auto;padding:1rem}
  .resv{background:#fff7e6;border:1px solid #f0d9a0;border-radius:12px;padding:.8rem 1rem;margin-bottom:1rem}
  .resv h2{margin:.1rem 0 .5rem;font-size:1rem;color:var(--warn)}
  .resv ul{margin:.2rem 0;padding-left:1.2rem}
  .resv li{margin:.2rem 0;font-size:.9rem}
  .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1rem;align-items:start}
  .dayhead{margin:.2rem 0 .8rem}
  .dayhead h2{margin:0;font-size:1.3rem}
  .dayhead .sub{color:var(--muted);font-size:.9rem}
  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:.7rem .85rem;margin-bottom:.7rem;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .item .tod{font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:var(--accent2);font-weight:700}
  .item .act{font-size:1.02rem;font-weight:600;margin:.15rem 0}
  .item .loc{font-size:.85rem;color:var(--muted)}
  .item .loc::before{content:"📍 "}
  .tags{margin-top:.5rem;display:flex;flex-direction:column;gap:.4rem}
  .tag{display:block;font-size:.85rem;border-radius:8px;padding:.45rem .6rem;text-decoration:none}
  .tag b{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.1rem}
  .tag.dine{background:#eef6f0;border:1px solid #cfe6d6;color:#1f4d36}
  .tag.dine b{color:var(--accent2)}
  .tag.dine .recos{margin:.15rem 0 0;padding-left:1.1rem}
  .tag.dine .recos li{margin:.1rem 0}
  .tag.dine a{color:var(--accent2);font-weight:600}
  .tag.transit{background:#e8f1fb;border:1px solid #c3dbf3;color:var(--transit);font-weight:600}
  .tag.transit b{color:var(--transit)}
  .tag.transit::before{content:"🚊 "}
  .tag.reserve{background:#fff3da;border:1px solid #f0d9a0;color:#8a6400}
  .tag.reserve b{color:var(--warn)}
  .tag.reserve::before{content:"⏰ "}
  .badge-hotel{display:inline-block;background:var(--accent);color:#fff;font-size:.68rem;
    padding:.12rem .5rem;border-radius:999px;margin-left:.4rem;vertical-align:middle;text-transform:uppercase;letter-spacing:.03em}
  .mapwrap{position:sticky;top:108px}
  #map{height:70vh;min-height:420px;border-radius:14px;border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(0,0,0,.08)}
  .leaflet-popup-content{font-size:.85rem}
  .note-car{background:#e8f1fb;border:1px solid #c3dbf3;color:var(--transit);
    border-radius:10px;padding:.5rem .7rem;font-size:.85rem;margin-bottom:.7rem}
  footer{text-align:center;color:var(--muted);font-size:.78rem;padding:1.5rem 1rem 2.5rem}
  /* view modes */
  body.view-list .mapwrap{display:none}
  body.view-list .grid{grid-template-columns:1fr}
  body.view-map .listcol{display:none}
  body.view-map .grid{grid-template-columns:1fr}
  @media (max-width:820px){
    .grid{grid-template-columns:1fr}
    .mapwrap{position:static}
    body:not(.view-map):not(.view-list) #map{height:50vh;min-height:320px}
    nav.days{top:auto;position:static}
    header{position:static}
  }
</style>

/* ---------- state & rendering ---------- */
let lang = "en";
let dayIdx = 0;
let map, markerGroup;
const t = o => o ? o[lang] : "";

function initMap(){
  map = L.map('map',{scrollWheelZoom:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'&copy; OpenStreetMap contributors'
  }).addTo(map);
  markerGroup = L.featureGroup().addTo(map);
}

function renderTabs(){
  const nav = document.getElementById('dayTabs');
  nav.innerHTML = '';
  DAYS.forEach((d,i)=>{
    const b = document.createElement('button');
    b.className = i===dayIdx ? 'active' : '';
    b.innerHTML = '<span class="num">'+(i+1)+'</span>'+t(d.wd);
    b.onclick = ()=>{ dayIdx=i; render(); };
    nav.appendChild(b);
  });
}

function renderReservations(){
  const box = document.getElementById('resvBox');
  let rows = [];
  DAYS.forEach((d,i)=>{
    d.items.forEach(it=>{ if(it.reserve) rows.push({day:i+1, wd:t(d.wd), text:t(it.reserve)}); });
  });
  let html = '<h2>'+t(UI.resvTitle)+'</h2><ul>';
  rows.forEach(r=>{ html += '<li><b>'+r.day+' · '+r.wd+':</b> '+r.text+'</li>'; });
  html += '</ul>';
  box.innerHTML = html;
}

function renderDay(){
  const d = DAYS[dayIdx];
  document.getElementById('dayHead').innerHTML =
    '<h2>'+(dayIdx+1)+'. '+t(d.wd)+'</h2>';
  const col = document.getElementById('listCol');
  let html = '';
  if(d.carReturn){ html += '<div class="note-car">🚗➡️🚇 '+t(UI.carNote)+'</div>'; }
  d.items.forEach(it=>{
    html += '<div class="item">';
    html += '<div class="tod">'+t(it.tod)+'</div>';
    html += '<div class="act">'+t(it.act);
    if(it.hotel) html += '<span class="badge-hotel">'+t(UI.hotel)+'</span>';
    html += '</div>';
    html += '<div class="loc">'+t(it.loc)+'</div>';
    if(it.note) html += '<div class="loc" style="margin-top:.3rem;color:#8a6400">✏️ '+t(it.note)+'</div>';
    html += '<div class="tags">';
    if(it.transit) html += '<a class="tag transit" target="_blank" rel="noopener" href="'+it.transit.url+'"><b>'+t(UI.transit)+'</b>'+t(UI.openMaps)+'</a>';
    if(it.dine){
      html += '<div class="tag dine"><b>'+t(UI.dining)+'</b><ul class="recos">';
      it.dine.recos.forEach(r=>{
        html += '<li><a target="_blank" rel="noopener" href="'+r.url+'">'+r.name+'</a> — '+t(r.note)+'</li>';
      });
      html += '</ul></div>';
    }
    if(it.reserve) html += '<div class="tag reserve"><b>'+t(UI.reserve)+'</b>'+t(it.reserve)+'</div>';
    html += '</div></div>';
  });
  col.innerHTML = html;
}

function renderMap(){
  markerGroup.clearLayers();
  const d = DAYS[dayIdx];
  d.items.forEach((it,idx)=>{
    if(!it.coord) return;
    const label = (it.pin? t(it.pin) : t(it.loc));
    const m = L.marker(it.coord).addTo(markerGroup);
    m.bindPopup('<b>'+(idx+1)+'. '+label+'</b><br>'+t(it.act));
  });
  if(markerGroup.getLayers().length){
    map.fitBounds(markerGroup.getBounds().pad(0.25), {maxZoom:14});
  }
  setTimeout(()=>map.invalidateSize(), 50);
}

function applyStaticText(){
  document.documentElement.lang = lang;
  document.getElementById('title').textContent = t(UI.title);
  document.getElementById('langBtn').textContent = t(UI.lang);
  document.getElementById('vBoth').textContent = t(UI.both);
  document.getElementById('vList').textContent = t(UI.list);
  document.getElementById('vMap').textContent = t(UI.map);
  document.getElementById('footer').textContent = t(UI.footer);
}

function render(){
  applyStaticText();
  renderTabs();
  renderReservations();
  renderDay();
  renderMap();
}

/* controls */
document.getElementById('langBtn').onclick = ()=>{ lang = (lang==='en'?'hu':'en'); render(); };
document.getElementById('viewSeg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.body.className = 'view-'+b.dataset.view;
  setTimeout(()=>{ map.invalidateSize(); renderMap(); }, 60);
});

initMap();
render();

/* register service worker for offline use */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
