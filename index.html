<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Our 2026 Trips</title>
<link rel="manifest" href="index.webmanifest">
<meta name="theme-color" content="#16315f">
<link rel="icon" type="image/png" href="icon-split-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="2026 Trips">
<link rel="apple-touch-icon" href="apple-touch-split.png">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f1f4f9;color:#222;padding:1.5rem;gap:1rem}
  h1{text-align:center;font-size:1.4rem;margin:.2rem 0 1rem;font-weight:600}
  .cards{display:flex;flex-direction:column;gap:1rem;max-width:460px;margin:0 auto;width:100%}
  a.card{display:flex;align-items:center;gap:1rem;text-decoration:none;color:#fff;
    border-radius:18px;padding:1.1rem 1.2rem;box-shadow:0 4px 16px rgba(0,0,0,.18)}
  a.card.hu{background:#436F4D}
  a.card.uk{background:#16315f}
  a.card img{width:64px;height:64px;border-radius:14px;flex:0 0 auto;background:#fff}
  a.card .t{font-size:1.2rem;font-weight:700}
  a.card .d{font-size:.85rem;opacity:.9}
  footer{text-align:center;color:#6b7783;font-size:.78rem;margin-top:1.5rem}
</style>
</head>
<body>
  <h1>Our 2026 Trips ✈️</h1>
  <div class="cards">
    <a class="card hu" href="itinerary.html">
      <img src="icon-192.png" alt="">
      <span><span class="t">🇭🇺 Hungary Trip</span><br><span class="d">Budapest &amp; Lake Balaton · 10–20 July</span></span>
    </a>
    <a class="card uk" href="london.html">
      <img src="icon-london-192.png" alt="">
      <span><span class="t">👑 London Trip</span><br><span class="d">Cambridge &amp; London · 19–29 July</span></span>
    </a>
  </div>
  <footer>Tap a trip, then use your browser's “Add to Home Screen” to install it as an app.</footer>
</body>
</html>
